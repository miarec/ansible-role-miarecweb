---
dependency:
  name: galaxy
  options:
    requirements-file: collections.yml
driver:
  name: docker
platforms:
  - name: miarecweb-${MOLECULE_DISTRO:-ubuntu2404}-stop-services
    image: ghcr.io/miarec/${MOLECULE_DISTRO:-ubuntu2404}-systemd:latest
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  playbooks:
    converge: ${MOLECULE_PLAYBOOK:-converge.yml}
    prepare: prepare.yml
  env:
    ANSIBLE_VERBOSITY: ${MOLECULE_ANSIBLE_VERBOSITY:-0}
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/../
    # Initial installation uses the old version (prepare.yml), the upgrade
    # installs the new version (converge.yml). The version gap guarantees an
    # alembic migration is required, so the stop_*_on_alembic_upgrade tasks fire.
    MIARECWEB_OLD_VERSION: ${MOLECULE_MIARECWEB_OLD_VERSION:-"2026.1.11.236"}
    MIARECWEB_VERSION: ${MOLECULE_MIARECWEB_VERSION:-"2026.6.8.0"}
    MIARECWEB_SECRET: ${MOLECULE_MIARECWEB_SECRET:-"secret"}
    PYTHON_VERSION: ${MOLECULE_PYTHON_VERSION:-"3.12"}

verifier:
  name: testinfra
  options:
    s: true
    verbose: true
